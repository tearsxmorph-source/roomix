services:
  postgres:
    image: postgres:16-alpine
    container_name: roomix-postgres
    environment:
      POSTGRES_DB: roomix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - roomix-postgres-data:/var/lib/postgresql/data

volumes:
  roomix-postgres-data:
